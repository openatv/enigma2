name: SonarCloud Analyze
on:
  workflow_run:
    workflows: ["PR Build"]
    types: [completed]
permissions:
  contents: read
jobs:
  analyze:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: sonar-bundle
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: tar -xzf sonar-bundle.tar.gz
      - name: Download PR metadata
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: pr-metadata
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.compile-commands=build_wrapper_output_directory/compile_commands.json
            -Dsonar.pullrequest.key=$(cat pr_number.txt)
            -Dsonar.pullrequest.branch=$(cat pr_branch.txt)
            -Dsonar.pullrequest.base=$(cat pr_base.txt)