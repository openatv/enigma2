name: SonarCloud Analyze
on:
  workflow_run:
    workflows: ["PR Build"]
    types: [completed]
permissions:
  contents: read
jobs:
  analyze:
    name: SonarCloud Scan
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: sonar-bundle
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract bundle
        run: tar -xzf sonar-bundle.tar.gz

      - name: Download event metadata
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: pr-metadata
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Sonar args
        id: args
        run: |
          EVENT=$(cat event_name.txt)
          if [ "$EVENT" = "pull_request" ]; then
            PR_NUMBER=$(cat pr_number.txt)
            PR_BRANCH=$(cat pr_branch.txt)
            PR_BASE=$(cat pr_base.txt)
            echo "value=-Dsonar.pullrequest.key=${PR_NUMBER} -Dsonar.pullrequest.branch=${PR_BRANCH} -Dsonar.pullrequest.base=${PR_BASE}" >> "$GITHUB_OUTPUT"
          else
            echo "value=-Dsonar.branch.name=master" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.projectKey=openatv_enigma2
            --define sonar.organization=openatv
            --define sonar.cfamily.compile-commands=build_wrapper_output_directory/compile_commands.json
            -Dsonar.verbose=true
            ${{ steps.args.outputs.value }}